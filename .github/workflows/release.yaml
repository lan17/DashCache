name: Release

on: workflow_dispatch

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Verify release source
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Release workflow must be run from main; got $GITHUB_REF" >&2
            exit 1
          fi

          git fetch --force origin main:refs/remotes/origin/main --tags
          remote_main="$(git rev-parse origin/main)"
          if [[ "$GITHUB_SHA" != "$remote_main" ]]; then
            echo "Release source $GITHUB_SHA is not current origin/main $remote_main" >&2
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v6.0.0
        with:
          semantic_version: 25.0.7
          extra_plugins: conventional-changelog-conventionalcommits@9.3.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
